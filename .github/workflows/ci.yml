name: CI

on:
  push:
    branches: [main, "agent/**"]
  pull_request:

permissions:
  contents: read

jobs:
  web:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run audit
      - name: Check formatting
        run: |
          if ! npm run format:check; then
            npx prettier --list-different . | tee prettier-different.txt
            exit 1
          fi
      - name: Upload formatting diagnostics
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: prettier-different
          path: prettier-different.txt
          retention-days: 1
      - run: npm run lint
      - run: npm run check:engine
      - run: npm run validate:levels
      - run: npm run test:coverage
      - run: npm run build
      - name: Build production container
        run: docker build --tag crazy-mini-golf:ci .
      - name: Smoke-test production container
        run: |
          set -euo pipefail
          docker run -d --name crazy-mini-golf-ci -p 8080:8080 crazy-mini-golf:ci
          trap 'docker rm -f crazy-mini-golf-ci >/dev/null 2>&1 || true' EXIT
          for attempt in {1..20}; do
            if curl -fsS http://127.0.0.1:8080/healthz >/dev/null; then
              break
            fi
            if [ "$attempt" -eq 20 ]; then
              docker logs crazy-mini-golf-ci
              exit 1
            fi
            sleep 1
          done
          curl -fsS http://127.0.0.1:8080/ | grep -q 'Crazy Mini Golf'
          curl -fsSI http://127.0.0.1:8080/ | grep -qi '^content-security-policy:'
      - run: npx playwright install --with-deps chromium
      - run: npm run test:e2e

  r-analysis:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: r-lib/actions/setup-r@v2
        with:
          r-version: "4.4"
      - uses: r-lib/actions/setup-r-dependencies@v2
        with:
          packages: any::jsonlite
      - run: Rscript analysis/analyze-levels.R src/levels/levels.json analysis/results
      - uses: actions/upload-artifact@v4
        with:
          name: level-analysis
          path: analysis/results
