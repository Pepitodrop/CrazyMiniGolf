name: CI

on:
  push:
    branches: [main, 'agent/**']
  pull_request:

permissions:
  contents: read

jobs:
  web:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run audit
      - run: npm run format:check
      - run: npm run lint
      - run: npm run check:engine
      - run: npm run validate:levels
      - run: npm run test:coverage
      - run: npm run build
      - run: npx playwright install --with-deps chromium
      - run: npm run test:e2e

  r-analysis:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: r-lib/actions/setup-r@v2
        with:
          r-version: '4.4'
      - uses: r-lib/actions/setup-r-dependencies@v2
        with:
          packages: any::jsonlite
      - run: Rscript analysis/analyze-levels.R src/levels/levels.json analysis/results
      - uses: actions/upload-artifact@v4
        with:
          name: level-analysis
          path: analysis/results
