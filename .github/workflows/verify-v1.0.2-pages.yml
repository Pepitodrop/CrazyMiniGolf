name: Diagnose v1.0.2 deployment

on:
  pull_request:
    branches: [main]

permissions:
  contents: read
  actions: read
  pages: read

jobs:
  diagnose-deployment:
    runs-on: ubuntu-latest
    env:
      GH_TOKEN: ${{ github.token }}
    steps:
      - name: Show failed deployment logs
        run: |
          set -euo pipefail
          gh run view 29209019081 --repo "$GITHUB_REPOSITORY" --log-failed || true
      - name: Show Pages API response
        run: |
          set -euo pipefail
          gh api --include "repos/${GITHUB_REPOSITORY}/pages" || true
