name: Review and merge validated PR

on:
  workflow_run:
    workflows: [CI]
    types: [completed]

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: review-merge-${{ github.event.workflow_run.id }}
  cancel-in-progress: false

jobs:
  review-and-merge:
    if: >-
      github.event.workflow_run.event == 'pull_request' &&
      github.event.workflow_run.conclusion == 'success' &&
      github.event.workflow_run.pull_requests[0] != null
    runs-on: ubuntu-latest
    env:
      GH_TOKEN: ${{ github.token }}
      REPOSITORY: ${{ github.repository }}
      PR_NUMBER: ${{ github.event.workflow_run.pull_requests[0].number }}
      VALIDATED_SHA: ${{ github.event.workflow_run.head_sha }}
    steps:
      - name: Validate pull-request scope
        id: scope
        run: |
          set -euo pipefail
          pr_json="$(gh api "repos/${REPOSITORY}/pulls/${PR_NUMBER}")"
          state="$(jq -r '.state' <<<"$pr_json")"
          draft="$(jq -r '.draft' <<<"$pr_json")"
          base="$(jq -r '.base.ref' <<<"$pr_json")"
          head_sha="$(jq -r '.head.sha' <<<"$pr_json")"
          head_repo="$(jq -r '.head.repo.full_name // ""' <<<"$pr_json")"

          test "$state" = "open"
          test "$draft" = "false"
          test "$base" = "main"
          test "$head_sha" = "$VALIDATED_SHA"

          if [ "$head_repo" != "$REPOSITORY" ]; then
            echo "merge_allowed=false" >> "$GITHUB_OUTPUT"
            echo "Fork PR detected; automated review will be posted, but automatic merge is disabled."
          else
            echo "merge_allowed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Submit automated production review
        run: |
          gh api --method POST "repos/${REPOSITORY}/pulls/${PR_NUMBER}/reviews" \
            -f event=COMMENT \
            -f body="Automated production review completed for commit ${VALIDATED_SHA}. The required CI workflow passed, including secret scan, dependency audit, formatting, typed lint, Brainfuck verification, level validation, coverage tests, production build, Docker build/runtime smoke test, cross-browser E2E, and R balancing analysis. No blocking automated findings remain."

      - name: Merge validated same-repository PR
        if: steps.scope.outputs.merge_allowed == 'true'
        run: |
          gh api --method PUT "repos/${REPOSITORY}/pulls/${PR_NUMBER}/merge" \
            -f merge_method=merge \
            -f sha="$VALIDATED_SHA" \
            -f commit_title="Merge validated PR #${PR_NUMBER}" \
            -f commit_message="Merged automatically after successful production review and complete CI."
