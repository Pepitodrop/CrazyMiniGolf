name: Automated PR Review

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]

permissions:
  contents: read
  pull-requests: write

jobs:
  review:
    if: github.event.pull_request.draft == false
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run audit
      - run: npm run format:check
      - run: npm run lint
      - run: npm run check:engine
      - run: npm run validate:levels
      - run: npm run test:coverage
      - run: npm run build
      - name: Submit automated review
        if: github.event.pull_request.head.repo.full_name == github.repository
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.pulls.createReview({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: context.issue.number,
              event: 'COMMENT',
              body: [
                '## Automated production review',
                '',
                '✅ Dependency audit',
                '✅ Formatting and typed lint',
                '✅ Brainfuck engine consistency',
                '✅ Level validation',
                '✅ Unit/integration coverage gates',
                '✅ Production build',
                '',
                'The full CI workflow separately validates secret history, Docker, cross-browser E2E, and R analysis. Merge only after every required check is green.'
              ].join('\n')
            });
