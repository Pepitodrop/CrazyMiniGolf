name: Apply production review

on:
  push:
    branches: [main]
    paths:
      - '.reviewed-production/**'
      - '.github/workflows/apply-production-review.yml'

permissions:
  contents: write

jobs:
  apply:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Apply reviewed source
        run: |
          cat .reviewed-production/part-* > /tmp/reviewed.patch
          echo "a2f50b81aa2c32dc76b58201567b9e5e83f71275c7af326d2fc0988ae8d6f93f  /tmp/reviewed.patch" | sha256sum -c -
          git apply --index /tmp/reviewed.patch
          install -m 0644 .reviewed-production/main.ts src/main.ts
          install -m 0644 .reviewed-production/trumpFeatures.ts src/storage/trumpFeatures.ts
          install -m 0644 .reviewed-production/speechFunction.ts src/trumpscript/speechFunction.ts
          install -m 0644 .reviewed-production/tremendous-function.tr src/trumpscript/tremendous-function.tr
          install -m 0644 .reviewed-production/trump-speech-function.test.ts tests/trump-speech-function.test.ts
          npm install --package-lock-only --ignore-scripts
          npm ci
          npm run generate:engine
          npm run format
          npm run lint
          npm run check:engine
          npm run validate:levels
          npm run test:coverage
          npm run build
          npx playwright install --with-deps chromium
          npm run test:e2e
      - uses: r-lib/actions/setup-r@v2
        with:
          r-version: '4.4'
      - uses: r-lib/actions/setup-r-dependencies@v2
        with:
          packages: any::jsonlite
      - name: Validate R analysis
        run: Rscript analysis/analyze-levels.R src/levels/levels.json analysis/results
      - name: Commit reviewed production state
        run: |
          rm -rf .reviewed-production
          rm -f .github/workflows/apply-production-review.yml
          rm -f .github/workflows/apply-reviewed-fix.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "fix: merge reviewed production-ready state"
          git push
