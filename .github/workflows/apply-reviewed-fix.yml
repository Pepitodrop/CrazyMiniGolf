name: Apply reviewed fix

on:
  push:
    branches: [main]
    paths:
      - '.reviewed-fix/**'
      - '.github/workflows/apply-reviewed-fix.yml'

permissions:
  contents: write

jobs:
  apply:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Apply transparent reviewed patch
        run: |
          cat .reviewed-fix/part-* > /tmp/crazy-mini-golf-reviewed.patch
          git apply --index /tmp/crazy-mini-golf-reviewed.patch
          mkdir -p scripts tests/e2e
          install -m 0644 .reviewed-fix/nf-00 playwright.config.ts
          install -m 0644 .reviewed-fix/nf-01 scripts/generate-brainfuck-engine.ts
          install -m 0644 .reviewed-fix/nf-02 tests/audio-manager.test.ts
          install -m 0644 .reviewed-fix/nf-03 tests/e2e/smoke.spec.ts
          install -m 0644 .reviewed-fix/nf-04 tests/engine-client.test.ts
          install -m 0644 .reviewed-fix/nf-05 tests/game.test.ts
          install -m 0644 .reviewed-fix/nf-06 tests/input-manager.test.ts
          install -m 0644 .reviewed-fix/nf-07 tests/renderer.test.ts
          install -m 0644 .reviewed-fix/nf-08 tests/trump-controller.test.ts
          install -m 0644 .reviewed-fix/nf-09 tests/worker.test.ts
          install -m 0644 .reviewed-fix/nf-10 vitest.config.ts
          npm install --package-lock-only --ignore-scripts
          npm ci
          npm run generate:engine
          npm run format
          npm run lint
          npm run check:engine
          npm run validate:levels
          npm run test:coverage
          npm run build
          rm -rf .reviewed-fix
          rm -f .github/workflows/apply-reviewed-fix.yml
      - name: Commit exact reviewed state
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "fix: apply complete reviewed release hardening"
          git push
