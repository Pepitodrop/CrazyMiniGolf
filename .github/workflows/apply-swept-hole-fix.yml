name: Apply swept hole fix

on:
  push:
    branches: [agent/fix-aim-bounce-hole-feedback]
    paths:
      - scripts/apply-swept-hole-fix.mjs
      - .github/workflows/apply-swept-hole-fix.yml
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened]

permissions:
  contents: write

jobs:
  apply:
    if: >-
      github.actor != 'github-actions[bot]' &&
      (github.event_name == 'push' || github.head_ref == 'agent/fix-aim-bounce-hole-feedback')
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/fix-aim-bounce-hole-feedback
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: node scripts/apply-swept-hole-fix.mjs
      - run: rm -f scripts/apply-swept-hole-fix.mjs
      - run: npm ci
      - run: npm run format
      - run: npm run lint
      - run: npm run test:coverage
      - run: npm run build
      - name: Commit product changes
        run: |
          git checkout HEAD -- .github/workflows/apply-swept-hole-fix.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "fix: detect swept high-speed hole crossings"
          git push origin HEAD:agent/fix-aim-bounce-hole-feedback
