name: Add online play link to README

on:
  push:
    branches:
      - main
    paths:
      - .github/workflows/add-play-link.yml

permissions:
  contents: write

jobs:
  update-readme:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Add online play link and remove temporary workflow
        shell: bash
        run: |
          python - <<'PY'
          from pathlib import Path

          readme = Path("README.md")
          text = readme.read_text(encoding="utf-8")
          play_line = "Play this game online at **[game.luisbenedikt.de](https://game.luisbenedikt.de/)**."

          if play_line not in text:
              lines = text.splitlines()
              insert_at = 1
              while insert_at < len(lines) and not lines[insert_at].strip():
                  insert_at += 1
              lines[insert_at:insert_at] = [play_line, ""]
              readme.write_text("\n".join(lines) + ("\n" if text.endswith("\n") else ""), encoding="utf-8")

          Path(".github/workflows/add-play-link.yml").unlink()
          PY

      - name: Commit README update
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add README.md .github/workflows/add-play-link.yml
          if ! git diff --cached --quiet; then
            git commit -m "Add online play link to README"
            git push
          fi
