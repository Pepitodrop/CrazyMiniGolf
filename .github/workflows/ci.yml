name: Apply reviewed production code

on:
  pull_request:
    branches: [main]

permissions:
  contents: write

jobs:
  apply:
    if: github.head_ref == 'agent/apply-final-production-code'
    runs-on: ubuntu-latest
    timeout-minutes: 12
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Apply and validate reviewed source
        run: |
          cat .reviewed-production/part-* > /tmp/reviewed.patch
          git apply --check /tmp/reviewed.patch
          git apply --index /tmp/reviewed.patch
          install -m 0644 .reviewed-production/main.ts src/main.ts
          install -m 0644 .reviewed-production/trumpFeatures.ts src/storage/trumpFeatures.ts
          install -m 0644 .reviewed-production/speechFunction.ts src/trumpscript/speechFunction.ts
          install -m 0644 .reviewed-production/tremendous-function.tr src/trumpscript/tremendous-function.tr
          install -m 0644 .reviewed-production/trump-speech-function.test.ts tests/trump-speech-function.test.ts
          rm -rf .reviewed-production
          npm install --package-lock-only --ignore-scripts
          npm ci
          npm run audit
          npm run generate:engine
          npm run format
          npm run lint
          npm run check:engine
          npm run validate:levels
          npm run test:coverage
          npm run build
          rm -f .github/workflows/apply-production-review.yml
          rm -f .github/workflows/apply-reviewed-fix.yml
          rm -f production-review-status.txt
      - name: Commit reviewed production code
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "fix: merge reviewed production-ready state"
          git push origin HEAD:${{ github.head_ref }}
