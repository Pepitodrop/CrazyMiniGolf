name: Diagnose v1.0.2 deployment

on:
  pull_request:
    branches: [main]

permissions:
  contents: read
  actions: read
  pages: read

jobs:
  diagnose-deployment:
    runs-on: ubuntu-latest
    env:
      GH_TOKEN: ${{ github.token }}
    steps:
      - name: Inspect main workflow runs
        run: |
          set -euo pipefail
          echo 'RECENT MAIN WORKFLOW RUNS'
          gh api "repos/${GITHUB_REPOSITORY}/actions/runs?branch=main&per_page=30" \
            --jq '.workflow_runs[] | [.id, .name, .event, .status, (.conclusion // "pending"), .head_sha, .html_url] | @tsv'
      - name: Inspect Pages configuration
        run: |
          set -euo pipefail
          echo 'PAGES CONFIGURATION'
          gh api "repos/${GITHUB_REPOSITORY}/pages" || true
      - name: Inspect expected public endpoint
        run: |
          set -euo pipefail
          curl -i -L --max-time 20 "https://pepitodrop.github.io/CrazyMiniGolf/" || true
