name: Verify deployed v1.0.2

on:
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  verify-pages:
    runs-on: ubuntu-latest
    steps:
      - name: Verify public Pages deployment
        run: |
          set -euo pipefail
          page_url="https://pepitodrop.github.io/CrazyMiniGolf/"
          for attempt in {1..40}; do
            html="$(curl -fsS "$page_url" || true)"
            asset_path="$(grep -oE '\./assets/[^" ]+\.js' <<<"$html" | head -n 1 || true)"
            javascript=""
            if [ -n "$asset_path" ]; then
              javascript="$(curl -fsS "${page_url}${asset_path#./}" || true)"
            fi
            if grep -q 'Crazy Mini Golf' <<<"$html" && grep -q 'v1.0.2' <<<"$javascript"; then
              echo "Verified Crazy Mini Golf v1.0.2 at $page_url"
              exit 0
            fi
            sleep 5
          done
          echo "The public Pages site did not expose the v1.0.2 bundle at $page_url" >&2
          exit 1
